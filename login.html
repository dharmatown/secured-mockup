<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fred's Bakery – Login</title>
<link rel="stylesheet" href="shared.css">
<script src="bcrypt.min.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="FREDS_ICON1.png" class="topbar-logo" onerror="this.style.display='none'">
    <span class="topbar-text">IS FREDS</span>
    <img src="FREDS_ICON1.png" class="topbar-logo" onerror="this.style.display='none'">
    <span class="topbar-text">IS GOOD</span>
  </div>
</div>

<div class="split">
  <div class="split-left"><img src="logo-big.png" style="width:100%;height:100%;object-fit:cover;opacity:0.3;"
       onerror="this.outerHTML='<div class=\'watermark\'>🥐</div>'"></div>
  <div class="split-right">
    <div class="page-title">Login</div>
    <div class="form-hint">Please login to continue</div>

    <div class="error-box" id="login-error"></div>

    <div class="form-group">
      <input type="email"    id="login-email"    placeholder="Email Address">
    </div>
    <div class="form-group">
      <input type="password" id="login-password" placeholder="Password">
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Log In</button>

    <div class="form-note">User accounts are provided</div>
    <div class="security-badge">
      🎫 A <strong>&nbsp;JWT token&nbsp;</strong> is issued upon successful login
    </div>
    <div class="form-footer">
      No account yet? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script>
const JWT_SECRET = 'f7K#mP2$xQnL9vRt4wYc8jBe6hZd3sAu'
function getUsers() { return JSON.parse(localStorage.getItem('bakery_users') || '[]') }
function saveUsers(u) { localStorage.setItem('bakery_users', JSON.stringify(u)) }
function findUserByEmail(email) { return getUsers().find(u => u.email.toLowerCase() === email.toLowerCase()) || null }

function b64url(str) {
  return btoa(unescape(encodeURIComponent(str)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')
}
function makeJWT(payload) {
  const header = b64url(JSON.stringify({ alg:'HS256', typ:'JWT' }))
  const body   = b64url(JSON.stringify({ ...payload, iat: Math.floor(Date.now()/1000), exp: Math.floor(Date.now()/1000)+(8*60*60) }))
  const sig    = b64url(JWT_SECRET+'.'+body)
  return `${header}.${body}.${sig}`
}
function decodeJWT(token) {
  try {
    const parts = token.split('.')
    if (parts.length !== 3) return null
    return JSON.parse(decodeURIComponent(escape(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')))))
  } catch { return null }
}
function isTokenValid(token) { const p = decodeJWT(token); return p && p.exp > Math.floor(Date.now()/1000) }
function showMsg(el, msg) { el.textContent = msg; el.style.display = 'block' }

function handleLogin() {
  const email    = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  const errBox   = document.getElementById('login-error')
  const btn      = document.getElementById('login-btn')

  errBox.style.display = 'none'

  if (!email || !password) return showMsg(errBox, 'Please enter your email and password.')
  if (typeof dcodeIO === 'undefined') return showMsg(errBox, 'bcrypt failed to load. Refresh the page.')

  btn.disabled = true
  btn.textContent = 'Verifying with bcrypt…'

  try {
    // 1️⃣ Look up user in localStorage
    const user = findUserByEmail(email)
    if (!user) throw new Error('No account found with that email.')

    // 2️⃣ Compare password against stored bcrypt hash
    const match = dcodeIO.bcrypt.compareSync(password, user.passwordHash)
    if (!match) throw new Error('Incorrect password.')

    // 3️⃣ Issue JWT token (built manually — no library needed)
    const token = makeJWT({ userId: user.id, email: user.email, role: user.role, name: user.fullName })

    // 4️⃣ Store JWT in localStorage
    localStorage.setItem('bakery_jwt', token)

    // 5️⃣ Redirect to dashboard
    window.location.href = 'dashboard.html'
  } catch (err) {
    showMsg(errBox, err.message || 'Login failed.')
  } finally {
    btn.disabled = false
    btn.textContent = 'Log In'
  }
}
</script>
</body>
</html>
