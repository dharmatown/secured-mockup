<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fred's Bakery – Login</title>
<link rel="stylesheet" href="shared.css">
<script src="bcrypt.min.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="FREDS_ICON1.png" class="topbar-logo" onerror="this.style.display='none'">
    <span class="topbar-text">IS FREDS</span>
    <img src="FREDS_ICON1.png" class="topbar-logo" onerror="this.style.display='none'">
    <span class="topbar-text">IS GOOD</span>
  </div>
</div>

<div class="split">
  <div class="split-left"><div class="watermark">🥐</div></div>
  <div class="split-right">
    <div class="page-title">Login</div>
    <div class="form-hint">Please login to continue</div>

    <div class="error-box" id="login-error"></div>

    <div class="form-group">
      <input type="email"    id="login-email"    placeholder="Email Address">
    </div>
    <div class="form-group">
      <input type="password" id="login-password" placeholder="Password">
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Log In</button>

    <div class="security-badge">
      🎫 A <strong>&nbsp;JWT token&nbsp;</strong> is issued upon successful login
    </div>
    <div class="form-footer">
      No account yet? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script>
// Use the same secret across your app
const JWT_SECRET = 'f7K#mP2$xQnL9vRt4wYc8jBe6hZd3sAu'

function getUsers() { 
    return JSON.parse(localStorage.getItem('bakery_users') || '[]') 
}

function findUserByEmail(email) { 
    return getUsers().find(u => u.email.toLowerCase() === email.toLowerCase()) || null 
}

function b64url(str) {
    return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')
}

// Improved JWT creation
function makeJWT(payload) {
    const header = b64url(JSON.stringify({ alg:'HS256', typ:'JWT' }))
    const body   = b64url(JSON.stringify({ 
        ...payload, 
        iat: Math.floor(Date.now()/1000), 
        exp: Math.floor(Date.now()/1000) + (8*60*60) 
    }))
    // Standard JWT signature format: header.payload.signature
    const sig = b64url(JWT_SECRET + "." + header + "." + body)
    return `${header}.${body}.${sig}`
}

function showMsg(el, msg) { 
    el.textContent = msg; 
    el.style.display = 'block' 
}

function handleLogin() {
    const email    = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value
    const errBox   = document.getElementById('login-error')
    const btn      = document.getElementById('login-btn')

    errBox.style.display = 'none'

    if (!email || !password) return showMsg(errBox, 'Please enter your email and password.')

    // Ensure bcrypt is loaded from the CDN
    if (typeof bcrypt === 'undefined') {
        return showMsg(errBox, 'Security library (bcrypt) failed to load. Please check your internet connection.')
    }

    btn.disabled = true
    btn.textContent = 'Verifying...'

    try {
        const user = findUserByEmail(email)
        if (!user) throw new Error('No account found with that email.')

        // Verify the typed password against the stored hash
        const match = bcrypt.compareSync(password, user.passwordHash)
        if (!match) throw new Error('Incorrect password.')

        // Create the session token
        const token = makeJWT({ 
            userId: user.id, 
            email: user.email, 
            role: user.role, 
            name: user.fullName 
        })

        localStorage.setItem('bakery_jwt', token)
        
        // Success redirect
        window.location.href = 'dashboard.html'
        
    } catch (err) {
        showMsg(errBox, err.message || 'Login failed.')
    } finally {
        btn.disabled = false
        btn.textContent = 'Log In'
    }
}
</script>
</body>
</html>
